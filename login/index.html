<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso Admin - CIRTA</title>
    
    <meta http-equiv="refresh" content="0; url=https://script.google.com/macros/s/AKfycbwHsaoUfznmDGJZponYs2OpXrIUq155FhfNyGGrGCGVjBQWLiHlH59TR1LFjf2DHuW7/exec">
    
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background: #f4f7f6;
            text-align: center;
            padding-top: 100px;
            color: #2c3e50;
        }
        .loader {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #3498db;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <h2>Conectando al servidor seguro...</h2>
    <div class="loader"></div>
    <p>Serás redirigido al panel de administración en un instante.</p>
    <p style="font-size: 12px; color: #7f8c8d; margin-top: 30px;">
        Si no eres redirigido, <a href="https://script.google.com/macros/s/AKfycbwHsaoUfznmDGJZponYs2OpXrIUq155FhfNyGGrGCGVjBQWLiHlH59TR1LFjf2DHuW7/exec" style="color: #3498db;">haz clic aquí</a>.
    </p>
</body>
</html>
